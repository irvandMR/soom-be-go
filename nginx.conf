server {
    listen 443 ssl;
    server_name tentic-foodstockmanagement.cloud;

    ssl_certificate /etc/letsencrypt/live/tentic-foodstockmanagement.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tentic-foodstockmanagement.cloud/privkey.pem;

    # Blokir akses ke dotfile (.env, .git, dll) — taruh PALING ATAS
    location ~ /\. {
        deny all;
        return 404;
    }

    # Blokir file config/secret yang sering jadi target scanner
    location ~* \.(env(\.\w+)?|git|sql|bak|backup|swp|log|ini)$ {
        deny all;
        return 404;
    }

    location ~* ^/(credentials|secrets|account|config|appsettings|firebase-adminsdk)\.json$ {
        deny all;
        return 404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}