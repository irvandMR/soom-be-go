server {
    listen 80;
    server_name 103.247.9.233;

    # 1. Routing untuk Frontend (Single Page Application)
    # Nginx akan mencari file statis di folder yang sudah kita mount
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Routing untuk Backend API
    # Semua request yang diawali dengan /api/ akan diteruskan ke container 'api'
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Opsi tambahan agar tidak ada error timeout untuk request berat
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}