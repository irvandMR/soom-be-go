server {
    listen 80;
    server_name tentic-foodstockmanagement.cloud;
    return 301 https://$host$request_uri; # Redirect otomatis ke HTTPS
}

server {
    listen 443 ssl;
    server_name tentic-foodstockmanagement.cloud;

    # Path ke sertifikat yang baru dibuat
    ssl_certificate /etc/letsencrypt/live/tentic-foodstockmanagement.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tentic-foodstockmanagement.cloud/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}