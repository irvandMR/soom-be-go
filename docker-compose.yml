services:
  redis:
    image: redis:7-alpine
    container_name: soom_go_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soom_go_api
    restart: always
    expose:
      - "8080"
    env_file:
      - .env
    volumes:
      - .env:/app/.env

  nginx:
    image: nginx:alpine
    container_name: soom_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
    - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    - /opt/install/soom-fe-go/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  redis_data: